name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Every Monday at 08:00 UTC — catches newly discovered vulnerabilities
    # in code that hasn't changed recently
    - cron: "0 8 * * 1"

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # Detect hardcoded credentials, path traversal, command injection, etc.
          queries: security-and-quality

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"