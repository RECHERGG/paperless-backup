# Paperless Backup Configuration

[backup]
interval_hours = "${BACKUP_INTERVAL_HOURS:6}"
filename_template = "${BACKUP_FILENAME_TEMPLATE:{timestamp}.tar.gz}"
delete_local_after_upload = "${BACKUP_DELETE_LOCAL_AFTER_UPLOAD:true}"
keep_failed_backups = "${BACKUP_KEEP_FAILED:true}"

[paperless]
container_name = "${PAPERLESS_CONTAINER:paperless-webserver}"

[storage.sftp]
host = "${SFTP_HOST}"
port = "${SFTP_PORT:22}"
username = "${SFTP_USERNAME}"

key = "${SFTP_KEY}"
password = "${SFTP_PASSWORD}"

remote_path = "${SFTP_PATH:paperless}"

# Retention
#
# strategy: one of gfs | simple | time | daily | none
#
# GFS (Grandfather-Father-Son) — recommended default
#   hourly:  keep the N most recent backups (rolling window)
#   daily:   keep one backup per day for the last N days
#   weekly:  keep one backup per week for the last N weeks
#   monthly: keep one backup per month for the last N months
#
# simple — keep only the last N backups
#   keep_last: number of backups to retain
#
# time — delete backups older than N days
#   max_age_days: maximum age in days
#   minimum_keep: always retain at least this many recent backups (safety floor)
#
# daily — one backup per day for the last N days
#   keep_days:    number of daily snapshots to retain
#   minimum_keep: always retain at least this many recent backups (safety floor)
#
# none — never delete anything (useful for testing or external cleanup)

[retention]
strategy = "gfs"

[retention.rules]
# GFS
hourly = "${RETENTION_HOURLY:24}"
daily = "${RETENTION_DAILY:7}"
weekly = "${RETENTION_WEEKLY:4}"
monthly = "${RETENTION_MONTHLY:12}"

# Simple
keep_last = "${RETENTION_KEEP_LAST:10}"
 
# Time-based
max_age_days = "${RETENTION_MAX_AGE_DAYS:30}"
 
# Daily-only
keep_days = "${RETENTION_KEEP_DAYS:7}"

# Shared (used by: time, daily)
minimum_keep = "${RETENTION_MINIMUM_KEEP:1}"