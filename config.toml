# Paperless Backup Configuration

[backup]
interval_hours = "${BACKUP_INTERVAL_HOURS:6}"
filename_template = "${BACKUP_FILENAME_TEMPLATE:{timestamp}.tar.gz}"
delete_local_after_upload = "${BACKUP_DELETE_LOCAL_AFTER_UPLOAD:true}"
keep_failed_backups = "${BACKUP_KEEP_FAILED:true}"

[paperless]
container_name = "${PAPERLESS_CONTAINER:paperless-webserver}"

[storage.sftp]
host = "${SFTP_HOST}"
port = "${SFTP_PORT:22}"
username = "${SFTP_USERNAME}"

key = "${SFTP_KEY}"
password = "${SFTP_PASSWORD}"

remote_path = "${SFTP_PATH:paperless-backups}"

[retention]
strategy = "gfs"

[retention.rules]
hourly = "${RETENTION_HOURLY:24}"
daily = "${RETENTION_DAILY:7}"
weekly = "${RETENTION_WEEKLY:4}"
monthly = "${RETENTION_MONTHLY:12}"

# Alternative retention strategies (examples):

# Simple strategy: keep only the last N backups
# strategy = "simple"
# keep_last = 20

# Time-based strategy: delete backups older than X days
# strategy = "time"
# max_age_days = 30

# Minimal strategy: only daily backups
# strategy = "daily-only"
# keep_days = 7

# No cleanup strategy (not recommended)
# strategy = "none"